<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="tags.js"></script>
    <script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>
    <title>Document</title>
    <link href="style1.css" rel="stylesheet" />
  </head>
  <body>
    <div class="bg"></div>
    <img src="./halfBg.png" class="halfBg" />
    <div class="text">
      <div class="copy">
        <p>
          <span class="title"> باپالاز </span>
          <br />
          اتاق‌کودکت‌رو <br />ازاین‌روبه<span class="mirror">‌اون‌رو‌کن</span>
        </p>
      </div>
      <img src="./cta.svg" class="cta" />
    </div>
    <div>
      <img src="./bg1.png" class="bg1" />
    </div>
    <div class="pic">
      <img src="./pic1.png" class="product pic1" />
      <img src="./pic2.png" class="product pic2" />
      <img src="./pic3.png" class="product pic3" />
    </div>

    <img
      src="https://cdn.yektanet.com/assets/images/yektanet-logo.webp"
      width="12px"
      height="12px"
      style="position: fixed; top: 2px; right: 2px"
    />
    <script src="script1.js"></script>
    <script>
      function getParameterByName(name) {
        name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
        var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null
          ? ''
          : decodeURIComponent(results[1].replace(/\+/g, ' '));
      }

      click_url = getParameterByName('click_url');
      if (click_url) {
        document.addEventListener('click', function () {
          open(click_url);
        });
      }
    </script>
  </body>
</html>
