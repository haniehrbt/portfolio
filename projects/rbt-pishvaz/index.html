<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="./tags.js"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/gsap.min.js"></script>
    <script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/ScrollToPlugin.min.js"></script>
  </head>
  <body>
    <div class="slide1 bg">
      <div class="bg1">
        <img src="bg1.png" class="backbg" />
        <img src="topTitle.png" class="topTitle" />
      </div>
      <div class="right-1">
        <img src="./giftprice.png" class="giftprice" />
        <div class="playBox">
          <div class="boxes box-1">
            <img class="imgbox" src="" />
          </div>
          <div class="boxes box-2">
            <img class="imgbox" src="" />
          </div>
          <div class="boxes box-3">
            <img class="imgbox" src="" />
          </div>
        </div>
        <img src="./gift.png" class="gift" />
      </div>
      <div class="left-1">
        <img class="mobile-1" src="./mobile.png" />
        <img src="./cta.png" class="cta" />
      </div>
      <img src="./gift.png" alt="" />
    </div>
    <script src="./data.js"></script>
    <script>
      function getParameterByName(name) {
        name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
        var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null
          ? ''
          : decodeURIComponent(results[1].replace(/\+/g, ' '));
      }

      click_url = getParameterByName('click_url');
      if (click_url) {
        document.addEventListener('click', function () {
          open(click_url);
        });
      }
    </script>
  </body>
  <script src="script.js"></script>
</html>
