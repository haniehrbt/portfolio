<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="tags.js"></script>
    <script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/gsap.min.js"></script>
    <title>uranus-agency.ir</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <img class="logo" src="logo.png" />
    <div class="container container-left">
      <div class="inner inner-left">
        <img class="color" src="color-left.svg" />
        <img class="bg" src="bg-left.png" />
        <img class="header" src="header-left.svg" />
        <img class="overline" src="left-overline.png" />
        <img class="cta" src="cta-right.svg" />
        <img class="hand" src="hand-left.svg" />
        <img class="intro intro-left" src="left-intro.png" />
      </div>
    </div>
    <div class="container container-right">
      <div class="inner inner-right">
        <img class="color" src="color-right.svg" />
        <img class="bg" src="bg-right.png" />
        <img class="header" src="header-right.svg" />
        <img class="overline" src="right-overline.png" />
        <img class="cta" src="cta-right.svg" />
        <img class="hand" src="hand-right.svg" />
        <img class="intro intro-right" src="right-intro.png" />
      </div>
    </div>

    <script src="script.js"></script>
  </body>
  <script>
    function getParameterByName(name) {
      name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
      var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
      var results = regex.exec(location.search);
      return results === null
        ? ''
        : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    click_url = getParameterByName('click_url');
    if (click_url) {
      document.addEventListener('click', function () {
        open(click_url);
      });
    }
  </script>
</html>
