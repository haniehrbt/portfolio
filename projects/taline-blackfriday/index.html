<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/gsap.min.js"></script>
    <title></title>
    <link href="style.css" rel="stylesheet" />
    <script src="./tags.js"></script>
  </head>
  <body>
    <div class="bgContainer">
      <div class="video-wrapper">
        <video loop muted autoplay playsinline preload="auto" class="bg-video">
          <source src="tehran.mp4" />
        </video>
        <img src="./circle.svg" class="circle" />
      </div>
    </div>
    <div class="left">
      <img src="./logo.svg" class="logo" />
      <img src="./overline.svg" class="overline" />
      <img src="./cta.svg" class="cta" />
    </div>

    <script src="script.js"></script>
    <script>
      function getParameterByName(name) {
        name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
        var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null
          ? ''
          : decodeURIComponent(results[1].replace(/\+/g, ' '));
      }

      click_url = getParameterByName('click_url');
      if (click_url) {
        document.addEventListener('click', function () {
          open(click_url);
        });
      }
    </script>
  </body>
</html>
