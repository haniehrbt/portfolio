<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/gsap.min.js"></script>
    <script src="./tags.js"></script>
    <title>Document</title>
    <link href="style5.css" rel="stylesheet" />
  </head>
  <body>
    <img src="./bg.png" class="bg" />

    <div class="right">
      <img src="notif1.svg" class="notif" />
      <img src="./bag.png" class="bag" />
    </div>
    <div class="left">
      <div class="leftContainer">
        <div class="bgBox">
          <img src="./bgProductRight.png" class="bgProductLeft" />
          <img src="./shadow.svg" class="shadow" />
          <img src="./product2.png" class="product2 product" />
        </div>
        <div class="bgBox">
          <img src="./bgProductRight.png" class="bgProductLeft" />
          <img src="./shadow.svg" class="shadow" />
          <img src="./product4.png" class="product4 product" />
        </div>
      </div>
      <div class="rightContainer">
        <div class="bgBox">
          <img src="./bgProductLeft.png" class="bgProductRight" />
          <img src="./shadow.svg" class="shadow" />
          <img src="./product1.png" class="product1 product" />
        </div>
        <div class="bgBox">
          <img src="./bgProductLeft.png" class="bgProductRight" />
          <img src="./shadow.svg" class="shadow" />
          <img src="./product3.png" class="product3 product" />
        </div>
      </div>
    </div>

    <div class="slide2">
      <img src="./bg2.svg" class="bg2" />
      <img src="./console.png" class="console" />
      <img src="./product1.png" class="product1-2" />
      <img src="./product4.png" class="product4-2" />
      <img src="product5.png" class="product5-2" />
      <div class="rightSlide2">
        <img src="./logo.svg" class="logo" />
        <img src="overline1.svg" class="overline" />
        <img src="./cta.svg" class="cta" />
      </div>
    </div>

    <script>
      function getParameterByName(name) {
        name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
        var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null
          ? ''
          : decodeURIComponent(results[1].replace(/\+/g, ' '));
      }

      click_url = getParameterByName('click_url');
      if (click_url) {
        document.addEventListener('click', function () {
          open(click_url);
        });
      }
    </script>
    <script src="script5.js"></script>
  </body>
</html>
