<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/gsap.min.js"></script>
    <script src="./tags.js"></script>
    <title>Document</title>
    <link href="style5.css" rel="stylesheet" />
  </head>
  <body>
    <img src="./bg.png" class="bg" />
    <img src="logo.svg" class="logo" />
    <div class="left">
      <img src="" class="overline" />
      <div class="day-btn-wrapper">
        <span class="day-btn-text"></span>
      </div>
      <div class="growth-indicator">
        <div class="growth-label-wrapper">
          <div class="growth-label-bg"></div>
          <span class="growth-label"></span>
        </div>
        <div class="growth-value-wrapper">
          <span class="growth-value"></span>
          <img src="upArrow1.svg" class="growth-arrow up-arrow" />
          <img src="down1.svg" class="growth-arrow down-arrow" />
        </div>
      </div>
    </div>
    <div class="right">
      <div class="bgPriceWrapper">
        <img src="bgPrice1.svg" class="bgPrice" />
        <span class="live-price">
          <span class="live-value"></span>
          <span class="live-indicator-wrapper">
            <span class="live-indicator" aria-hidden="true"></span>
          </span>
          <span class="live-currency"> تومان</span>
        </span>
      </div>
      <span class="cta">خریدنقره</span>
    </div>
    <script>
      function getParameterByName(name) {
        name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
        var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null
          ? ''
          : decodeURIComponent(results[1].replace(/\+/g, ' '));
      }
      click_url = getParameterByName('click_url');
      if (click_url) {
        document.addEventListener('click', function () {
          open(click_url);
        });
      }
    </script>
    <script src="script5.js"></script>
  </body>
</html>
