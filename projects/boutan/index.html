<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/gsap.min.js"></script>
    <title>uranus-agency.ir</title>
    <link href="style2.css" rel="stylesheet" />
    <script src="tags.js"></script>
  </head>
  <body>
    <div class="bg"></div>
    <img src="./butan.png" class="product" />
    <img src="./badge.png" class="badge" />
    <img src="./logo1.png" class="logo" />
    <img src="cta1.svg" class="cta" />
    <img src="./overline.svg" class="overline" />

    <script src="script1.js"></script>
    <script>
      function getParameterByName(name) {
        name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
        var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null
          ? ''
          : decodeURIComponent(results[1].replace(/\+/g, ' '));
      }

      click_url = getParameterByName('click_url');
      if (click_url) {
        document.addEventListener('click', function () {
          open(click_url);
        });
      }
    </script>
  </body>
</html>
