    <link href="style.css" rel="stylesheet" />
  </head>

  <body>
    <div class="slide2">

        <img src="grouppProducts.png" class="grouppProducts" />
      </div>

      <img src="./overline.svg" class="overline" />
      <img src="./cta.svg" class="cta" />

      <div class="right">

      </div>
      <img
        src="back-carousel-.png"
        class="back-carousel"
        alt="background carousel"
      />

      <div class="CarouselContainer">
        <div class="carousel-wrapper">
          <div class="product" data-index="0">
            <img src="./stage.png" class="stage" alt="stage" />
            <img src="./product1.png" alt="Product 1" />
          </div>

          <div class="product" data-index="1">
            <img src="./stage.png" class="stage" alt="stage" />
            <img src="./product2.png" alt="Product 2" />

          <div class="product" data-index="2">
            <img src="./stage.png" class="stage" alt="stage" />

          </div>

          <div class="product" data-index="3">
            <img src="./stage.png" class="stage" alt="stage" />
            <img src="./product4.png" alt="Product 4" />
          </div>

          <div class="product" data-index="4">
            <img src="./stage.png" class="stage" alt="stage" />
            <img src="./product5.png" alt="Product 5" />
          </div>

          <div class="product" data-index="5">

            <img src="./product8.png" alt="Product 8" />
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>

    <script>
      function getParameterByName(name) {
        name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
        var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null
          ? ''
          : decodeURIComponent(results[1].replace(/\+/g, ' '));
      }

      click_url = getParameterByName('click_url');
      if (click_url) {
        document.addEventListener('click', function () {
          open(click_url);
        });
      }
    </script>
  </body>
</html>
