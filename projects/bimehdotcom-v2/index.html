    <script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/gsap.min.js"></script>
    <link href="style.css" rel="stylesheet"/>
</head>
<body>
<div class="bg-overlay"></div>
<img src="./logo.png" class="logo2"/>
<span class="overline">بیمه شخص ثالث با <span style="color:#53FE43">۱۶ درصد</span> تخفیف</span>

<div class="carContainer">
    <div class="carBody">

        <img src="./02.png" class="wheel wheel-back" alt="">

        <span class="stats-label">درصد تخفیف</span>
    </div>
</div>
<script src="script.js"></script>
</body>
<script>
    function getParameterByName(name) {
        name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
        var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null
            ? ''
            : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    click_url = getParameterByName('click_url');
    if (click_url) {
        document.addEventListener('click', function () {
            open(click_url);
        });
    }
</script>
</html>
