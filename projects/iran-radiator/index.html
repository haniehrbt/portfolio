<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iran Radiator</title>
    <script src="./tags1.js"></script>
    <link href="style2.css" rel="stylesheet"/>

<body>
    <div class="bgContainer">
        <img src="./bg1.png" class="bg bg1"/>
        <img src="./bg2.png" class="bg bg2"/>
        <img src="./bg3.png" class="bg bg3"/>
    </div>
    <div class="section">

            <img src="./logo.png" class="logo"/>

        <div class="main">

            </div>

            <img src="./coldWind.png" class="wind coldWind"/>
        </div>
        <div class="right">
            <img src="./overline1.png" class="overline overline1"/>
            <img src="./overline2.png" class="overline overline2"/>
            <div class="imageContainer">
                <img src="./control.png" class="control"/>
            </div>
            <span class="image-text">22</span>
            <div class="btnContainer">
                <img src="./increment.png" class="mosbat" id="increment"/>
