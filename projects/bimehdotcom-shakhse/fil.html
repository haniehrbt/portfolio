<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ثبت تردد</title>

  <style>
      @font-face {
          font-family: "Vazirmatn";
          src: url("{{ url_for('static', filename='Vazirmatn-Medium.ttf') }}") format("truetype");
      }
      :root {
          --orange:#ff5b35; --green:#10b981; --red:#ef4444; --blue:#3b82f6;
          --bg:#f8fafc; --card:#fff; --text:#1e293b;
      }
      *{margin:0;padding:0;box-sizing:border-box;}
      html,body{
          width:100%;min-height:100vh;
          font-family:"Vazirmatn",sans-serif;
          background:var(--bg);color:var(--text);
          display:flex;justify-content:center;align-items:center;padding:20px;
      }
      .card{
          width:100%;max-width:400px;background:var(--card);border-radius:24px;
          box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);
          padding:30px;display:flex;flex-direction:column;align-items:center;gap:16px;
      }
      h2{font-size:22px;}
      .sub{
          font-size:13px;color:#64748b;background:#f1f5f9;
          padding:4px 12px;border-radius:20px;
      }
      .status{
          width:100%;padding:10px;text-align:center;border-radius:12px;
          background:#f8fafc;color:#475569;font-size:14px;
      }
      .btn{
          width:100%;padding:14px;border:none;border-radius:14px;
          display:flex;justify-content:center;align-items:center;gap:8px;
          font-size:15px;font-weight:600;cursor:pointer;transition:0.3s;
      }
      .btn:active{transform:scale(0.98);}
      .btn-blue{background:var(--blue);color:#fff;}
      .btn-green{background:var(--green);color:#fff;}
      .btn-red{background:var(--red);color:#fff;}
      .btn-gray{background:#e2e8f0;color:#475569;}
      video,img{
          width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:20px;margin-top:10px;
      }
      .loader{
          margin-top:15px;display:flex;flex-direction:column;gap:10px;
          color:var(--blue);font-weight:500;
      }
      .spinner{
          width:32px;height:32px;border:3px solid #dbeafe;border-top:3px solid var(--blue);
          border-radius:50%;animation:spin .8s linear infinite;
      }
      @keyframes spin{100%{transform:rotate(360deg);}}
      .success-box{text-align:center;padding:20px;}
      .success-box .check{font-size:60px;margin-bottom:15px;}
      .hidden{display:none;}
  </style>
</head>

<body>

<div class="card" id="main-card">
  <h2 id="page-title">ثبت تردد</h2>
  <div id="page-sub" class="sub"></div>

  <div id="gps-status" class="status">بررسی اطلاعات کاربر...</div>

  <button id="btn-retry-gps" class="btn btn-gray hidden" onclick="getLocation()">🔄 تلاش مجدد GPS</button>
  <button id="btn-open-camera" class="btn btn-blue hidden" onclick="openCamera()">📷 باز کردن دوربین</button>

  <video id="camera" autoplay playsinline class="hidden"></video>
  <canvas id="canvas" class="hidden"></canvas>

  <button id="btn-capture" class="btn btn-blue hidden" onclick="capturePhoto()">📸 ثبت عکس</button>

  <img id="preview" class="hidden">

  <button id="btn-submit" class="btn hidden" onclick="submitAttendance()">ثبت</button>

  <div id="status" class="status"></div>

  <div id="loader" class="loader hidden">
    <div class="spinner"></div>
    <div>در حال پردازش...</div>
  </div>
</div>

<script>
  const SCRIPT_URL = window.location.origin + "/api/attendance";

  const urlParams = new URLSearchParams(window.location.search);
  const userId = urlParams.get("user_id");
  const attendanceType = urlParams.get("type");

  let latitude = null;
  let longitude = null;
  let photoBase64 = null;
  let cameraStream = null;

  let gpsFallbackTimer = null;
  let activeWatchId = null;

  const E = id => document.getElementById(id);
  const setStatus = t => E("status").innerText = t;
  const showLoader = v => E("loader").classList.toggle("hidden", !v);

  window.onload = () => {
    if(attendanceType === "start"){
      E("page-title").innerText = "✅ ثبت شروع شیفت";
      E("btn-submit").classList.add("btn-green");
      E("btn-submit").innerHTML = "✅ ثبت ورود";
    } else if(attendanceType === "end"){
      E("page-title").innerText = "🏁 ثبت پایان شیفت";
      E("btn-submit").classList.add("btn-red");
      E("btn-submit").innerHTML = "🏁 ثبت خروج";
    } else {
      setStatus("نوع تردد نامعتبر است.");
      return;
    }

    if(!userId){
      setStatus("شناسه کاربر یافت نشد.");
      return;
    }

    E("page-sub").innerText = "کاربر: " + userId;
    getLocation();
  };

  function getLocation(){
    E("gps-status").innerText = "در حال دریافت موقعیت...";
    setStatus("");
    showLoader(true);
    E("btn-retry-gps").classList.add("hidden");
    E("btn-open-camera").classList.add("hidden");
    E("btn-submit").classList.add("hidden");

    clearTimeout(gpsFallbackTimer);
    if(activeWatchId !== null){
      navigator.geolocation.clearWatch(activeWatchId);
      activeWatchId = null;
    }
    latitude = null;
    longitude = null;

    if(!navigator.geolocation){
      onGpsError("مرورگر شما از GPS پشتیبانی نمی‌کند");
      return;
    }

    let settled = false;

    function done(lat, lng, msg){
      if(settled) return;
      settled = true;
      clearTimeout(gpsFallbackTimer);
      if(activeWatchId !== null){
        navigator.geolocation.clearWatch(activeWatchId);
        activeWatchId = null;
      }
      latitude = lat;
      longitude = lng;
      finalizeGPS(msg);
    }

    function tryFail(msg){
      if(settled) return;
      if(latitude !== null){
        done(latitude, longitude, "📍 موقعیت تقریبی دریافت شد");
      } else {
        settled = true;
        clearTimeout(gpsFallbackTimer);
        if(activeWatchId !== null){
          navigator.geolocation.clearWatch(activeWatchId);
          activeWatchId = null;
        }
        onGpsError(msg);
      }
    }

    // روش ۱: مبتنی بر شبکه/WiFi — وابستگی کمتر به Google Play Services
    navigator.geolocation.getCurrentPosition(
      pos => {
        latitude = pos.coords.latitude;
        longitude = pos.coords.longitude;
        done(pos.coords.latitude, pos.coords.longitude,
          "📍 موقعیت دریافت شد (دقت " + Math.round(pos.coords.accuracy) + " متر)");
      },
      () => {},
      {enableHighAccuracy:false, timeout:15000, maximumAge:120000}
    );

    // روش ۲: GPS دقیق — اگر زودتر به دقت مناسب برسد استفاده می‌شود
    activeWatchId = navigator.geolocation.watchPosition(
      pos => {
        latitude = pos.coords.latitude;
        longitude = pos.coords.longitude;
        const acc = Math.round(pos.coords.accuracy);
        if(!settled) E("gps-status").innerText = "⏳ در حال دقیق‌تر کردن موقعیت... (" + acc + " متر)";
        if(acc <= 300) done(pos.coords.latitude, pos.coords.longitude, "✅ GPS دریافت شد (دقت " + acc + " متر)");
      },
      () => {
        if(!settled) E("gps-status").innerText = "⏳ در حال دریافت موقعیت...";
      },
      {enableHighAccuracy:true, timeout:20000, maximumAge:0}
    );

    // پس از ۲۰ ثانیه با هر چیزی که داریم جلو می‌رویم
    gpsFallbackTimer = setTimeout(() => tryFail("زمان دریافت موقعیت تمام شد"), 20000);
  }

  function finalizeGPS(msg){
    showLoader(false);
    E("gps-status").innerHTML = msg;
    setStatus("موقعیت دریافت شد. عکس بگیرید.");
    E("btn-open-camera").classList.remove("hidden");
  }

  function onGpsError(reason){
    E("gps-status").innerHTML = "⚠️ " + reason;
    showLoader(false);
    setStatus("امکان دریافت موقعیت دقیق وجود ندارد.");
    E("btn-retry-gps").classList.remove("hidden");
    E("btn-open-camera").classList.remove("hidden");
  }

  function openCamera(){
    E("btn-open-camera").classList.add("hidden");

    navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
      .then(stream => {
        cameraStream = stream;
        const video = E("camera");
        video.srcObject = stream;
        video.classList.remove("hidden");
        E("btn-capture").classList.remove("hidden");
        setStatus("دوربین فعال شد.");
      })
      .catch(()=>{
        setStatus("❌ دسترسی به دوربین ممکن نیست");
        E("btn-open-camera").classList.remove("hidden");
      });
  }

  function capturePhoto(){
    const video = E("camera");
    const canvas = E("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    const now = new Date().toLocaleString("fa-IR");
    const latText = latitude ? latitude.toFixed(5) : "نامشخص";
    const lngText = longitude ? longitude.toFixed(5) : "نامشخص";

    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0,canvas.height-70,canvas.width,70);

    const fontSize = Math.max(14,Math.floor(canvas.width*0.04));
    ctx.font = "bold "+fontSize+"px Vazirmatn";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "right";

    ctx.fillText("تاریخ و ساعت: "+now,canvas.width-15,canvas.height-35);
    ctx.fillText("مختصات: "+latText+" , "+lngText,canvas.width-15,canvas.height-10);

    photoBase64 = canvas.toDataURL("image/jpeg",0.8);
    E("preview").src = photoBase64;
    E("preview").classList.remove("hidden");

    video.classList.add("hidden");
    E("btn-capture").classList.add("hidden");

    setStatus("عکس ثبت شد.");
    E("btn-submit").classList.remove("hidden");

    if(cameraStream){
      cameraStream.getTracks().forEach(t=>t.stop());
    }
  }

  async function submitAttendance(){
    if(!photoBase64){
      setStatus("خطا: عکس گرفته نشده است.");
      return;
    }

    showLoader(true);
    E("btn-submit").classList.add("hidden");

    const payload = {
      user_id:userId,
      attendance_type:attendanceType || "unknown",
      photo:photoBase64,
      latitude,
      longitude,
      timestamp:new Date().toISOString()
    };

    try{
      const res = await fetch(SCRIPT_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });

      const result = await res.json();
      result.success ? showSuccess(true) : showSuccess(false,result.message);

    }catch(e){
      showSuccess(false,e.message);
      E("btn-submit").classList.remove("hidden");
    }
  }

  function showSuccess(ok,msg=""){
    const color = ok ? "var(--green)" : "var(--red)";
    const title = ok ? "ثبت موفق" : "خطا در ثبت";
    const text = ok ? "اطلاعات با موفقیت ثبت شد." : ("خطا: " + (msg||"ارتباط با سرور برقرار نشد."));

    E("main-card").innerHTML = `
    <div class="success-box">
        <div class="check" style="color:${color}">${ok?"✅":"❌"}</div>
        <h3 style="color:${color}">${title}</h3>
        <p>${text}</p>
        <p style="margin-top:20px;color:#888;font-size:13px">
        می‌توانید این صفحه را ببندید و بازگردید.
        </p>
    </div>`;
  }
</script>

</body>
</html>
