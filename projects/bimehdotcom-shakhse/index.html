  <script src="tags.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    if (!window.gsap) {
      document.write('<script src="https://cdn.yektanet.com/assets/3rdparty/gsap@3.12.5/gsap.min.js"><\/script>');
    }
  </script>
  <title>Document</title>
  <link href="style.css" rel="stylesheet" />
</head>
<body>
<img src="./logo.png" class="logo" />
<div class="bg-overlay">
  <img src="./logo2.png" class="logo2" />
  <img src="./overline.svg" class="overline" />
  <img src="./cta.png" class="cta">
</div>
<div class="bar">
  <img src="./barContainer.png" class="barContainer" />
  <div class="gradient-fill"></div>
</div>

<div class="carContainer">
  <img src="./car2.png" class="car">
  <img src="./02.png" class="wheel wheel-front" alt="">
  <img src="./02.png" class="wheel wheel-back" alt="">
  <div class="stats-box">
    <span class="stats-number">12</span>
    <span class="stats-percent">٪</span>
  </div>
</div>
<script src="script.js"></script>
</body>
<script>
  function getParameterByName(name) {
    name = name.replace(/[\[]/, '\[').replace(/[\]]/, '\]');
    var regex = new RegExp('[\?&]' + name + '=([^&#]*)');
    var results = regex.exec(location.search);
    return results === null
      ? ''
      : decodeURIComponent(results[1].replace(/\+/g, ' '));
  }

  click_url = getParameterByName('click_url');
  if (click_url) {
    document.addEventListener('click', function() {
      open(click_url);
    });
  }
</script>
</html>
