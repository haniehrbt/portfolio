<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banner Preview — Hanieh Robati</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #07071a;
      --ink2:    #060f24;
      --ink3:    #0a1535;
      --surface: #0f0f28;
      --border:  rgba(255,255,255,0.08);
      --text:    #eef2ff;
      --muted:   #6b7fc4;
      --p:       #2563eb;
      --p2:      #3b82f6;
      --p3:      #60a5fa;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 24px;
      background: rgba(7,7,26,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }
    .back-btn:hover { color: var(--p3); border-color: rgba(96,165,250,.4); }
    .topbar-info { flex: 1; min-width: 0; }
    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .size-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 100px;
      background: rgba(37,99,235,.12);
      border: 1px solid rgba(37,99,235,.28);
      font-size: 12px;
      font-weight: 700;
      color: var(--p3);
      font-family: monospace;
      white-space: nowrap;
    }

    /* ── Stage ── */
    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px 40px;
      gap: 24px;
    }
    .stage-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── iPhone mockup ── */
    .phone-wrap {
      position: relative;
    }
    /* side buttons */
    .phone-wrap::before,
    .phone-wrap::after {
      content: '';
      position: absolute;
      right: -3px;
      width: 3px;
      background: rgba(255,255,255,.1);
      border-radius: 0 2px 2px 0;
    }
    .phone-wrap::before { top: 120px; height: 36px; }
    .phone-wrap::after  { top: 168px; height: 60px; }

    .iphone {
      width: min(375px, calc(100vw - 48px));
      height: clamp(500px, 80vh, 780px);
      background: var(--ink2);
      border: 1.5px solid rgba(255,255,255,.13);
      border-radius: 50px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow:
        0 0 0 6px var(--ink3),
        0 0 0 7.5px rgba(255,255,255,.07),
        0 40px 100px rgba(0,0,0,.8),
        0 0 140px rgba(37,99,235,.1);
    }

    /* Dynamic island */
    .island {
      width: 110px;
      height: 32px;
      background: #000;
      border-radius: 0 0 20px 20px;
      margin: 0 auto;
      flex-shrink: 0;
      z-index: 5;
      position: relative;
    }
    .island::before {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.07);
      top: 50%; right: 20px;
      transform: translateY(-50%);
    }

    /* Fake app screen */
    .app-screen {
      flex: 1;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* App toolbar */
    .app-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 8px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .tb-icon { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,.06); }
    .tb-title { width: 80px; height: 14px; border-radius: 6px; background: rgba(255,255,255,.08); }

    /* Fake search bar */
    .app-search {
      margin: 10px 16px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }

    /* Fake content blocks */
    .app-content-area {
      flex: 1;
      padding: 6px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }
    .row-label {
      height: 10px;
      width: 90px;
      border-radius: 5px;
      background: rgba(255,255,255,.06);
      flex-shrink: 0;
    }
    .cards-row {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .app-card {
      flex: 1;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      overflow: hidden;
    }
    .app-card-img { width: 100%; height: 64px; background: rgba(255,255,255,.05); }
    .app-card-line {
      height: 8px; border-radius: 4px;
      background: rgba(255,255,255,.06);
      margin: 8px 8px 4px;
    }
    .app-card-line.short { width: 55%; margin-bottom: 8px; }
    .small-cards-row { display: flex; gap: 8px; flex-shrink: 0; }
    .small-card {
      flex: 1;
      height: 68px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
    }

    /* Bottom nav */
    .app-bottomnav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,.05);
      flex-shrink: 0;
    }
    .nav-dot { width: 20px; height: 20px; border-radius: 6px; background: rgba(255,255,255,.05); }
    .nav-dot.active { background: rgba(37,99,235,.3); }

    /* Shimmer animation on content */
    @keyframes shimmer {
      0%   { opacity: .4; }
      50%  { opacity: .7; }
      100% { opacity: .4; }
    }
    .app-card-img, .app-card-line, .small-card, .row-label,
    .tb-icon, .tb-title, .app-search { animation: shimmer 2.4s ease-in-out infinite; }

    /* Live banner slot */
    .banner-slot {
      height: 150px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      background: #000;
    }
    .banner-iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 150px;
      border: none;
      display: block;
    }

    /* Home bar */
    .iphone-home-bar {
      height: 28px;
      flex-shrink: 0;
      background: var(--ink2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .iphone-home-bar::after {
      content: '';
      width: 120px; height: 4px;
      background: rgba(255,255,255,.25);
      border-radius: 4px;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity .4s;
      backdrop-filter: blur(4px);
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(59,130,246,.2);
      border-top-color: var(--p2);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hint */
    .hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
    .hint b { color: var(--text); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 18px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    .footer a { color: var(--p3); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="topbar-info">
      <div class="topbar-title" id="banner-name">Banner Preview</div>
      <div class="topbar-sub" id="banner-client">Hanieh Robati — Front-End Developer</div>
    </div>
    <span class="size-badge" id="size-info">📐 Sticky 150px</span>
  </div>

  <div class="stage">
    <span class="stage-label">Live Preview — As Seen on Device</span>

    <div class="phone-wrap">
      <div class="iphone">

        <div class="island"></div>

        <div class="app-screen">
          <div class="app-toolbar">
            <div class="tb-icon"></div>
            <div class="tb-title"></div>
            <div class="tb-icon"></div>
          </div>

          <div class="app-search"></div>

          <div class="app-content-area">
            <div class="row-label"></div>
            <div class="cards-row">
              <div class="app-card">
                <div class="app-card-img"></div>
                <div class="app-card-line"></div>
                <div class="app-card-line short"></div>
              </div>
              <div class="app-card">
                <div class="app-card-img"></div>
                <div class="app-card-line"></div>
                <div class="app-card-line short"></div>
              </div>
            </div>
            <div class="row-label"></div>
            <div class="small-cards-row">
              <div class="small-card"></div>
              <div class="small-card"></div>
              <div class="small-card"></div>
            </div>
          </div>

          <div class="app-bottomnav">
            <div class="nav-dot active"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
          </div>
        </div>

        <div class="banner-slot">
          <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
          </div>
          <iframe
            class="banner-iframe"
            id="banner-frame"
            sandbox="allow-scripts allow-same-origin allow-popups"
            scrolling="no"
          ></iframe>
        </div>

        <div class="iphone-home-bar"></div>

      </div>
    </div>

    <p class="hint">
      Sticky banner · <b>full width × 150px</b> · exactly as users see it on ad networks<br>
      Animated with <b>GSAP</b> · Production-ready HTML5
    </p>
  </div>

  <div class="footer">
    <a href="index.html">← Hanieh Robati — Portfolio</a>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const proj   = params.get('p')      || '';
    const name   = params.get('name')   || 'Banner Preview';
    const client = params.get('client') || '';

    if (proj) {
      document.getElementById('banner-name').textContent   = name;
      document.getElementById('banner-client').textContent = client || 'Hanieh Robati — Front-End Developer';
      document.title = name + ' — Banner Preview';

      const frame = document.getElementById('banner-frame');
      frame.src   = proj + '/index.html';
      frame.addEventListener('load', () => {
        document.getElementById('loading').classList.add('hidden');
      });
    }
  </script>
</body>
</html>
